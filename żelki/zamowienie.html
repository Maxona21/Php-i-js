<!DOCTYPE html>
<html lang="pl-PL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabryka Żelków</title>
    <link rel="stylesheet" href="styl9.css">
</head>
<body>
    <header id="gora1"> <a href="index.html"><img src="cukierki2.png" alt="logo fabryki"></a></header>
    <header id="gora2"><a href="zamowienie.html" id="obraz">Zamówienie</a><br></header>
    <section id="baner"><h2>Zamów nasz produkt</h2></section>
    <section id="lewy">
        <h1>Oferta</h1>
        <table>
            <tr>
                <th>Kształty</th>
                <th>Kolory</th>
            </tr>
            <tr>
                <td><ol>
                    <li>Miś</li>
                    <li>Żabka</li>
                    <li>Serce</li>
                </ol></td>
                <td>
                    <ol>
                        <li>czerwony</li>
                        <li>niebieski</li>
                        <li>żółty</li>
                        <li>inny</li>
                    </ol>
                </td>
            </tr>
        </table>
    </section>
    <section id="prawy">
        <label>Podaj numer kształtu:</label><br>
        <input type="number" id="ksztalt"><br>
        <p>Skomponuj swój kolor, podaj RGB</p>
        <label>R</label><input type="number" id="czerwony" onchange="zmianaKoloru()">
        <label>G</label><input type="number" id="zielony" onchange="zmianaKoloru()">
        <label>B</label><input type="number" id="niebieski" onchange="zmianaKoloru()">
        <button id="zamow" onclick="zamow()">Zamów</button>

        <p id="change">Wybrany kształt: </p>

        <button id="kolor" onclick="zmianaKoloru()">Wybrany kolor</button>
    </section>
    <footer><i><p>Autor strony: ja</p></i></footer>
    <script>
        function zamow(){
            const produkt = document.getElementById("ksztalt").value;
        if ( produkt == 1){
            document.getElementById("change").innerHTML = "Zamówiłeś: miś";
        } else if (produkt == 2) {
           document.getElementById("change").innerHTML = "Zamówiłeś: żabka"; 
        } else if (produkt == 3){
            document.getElementById("change").innerHTML = "Zamówiłeś: serce";
        } else {
            document.getElementById("change").innerHTML = "inny kształt";
        }
        }
        function zmianaKoloru() {
            const red = document.getElementById("czerwony").value;
            const green = document.getElementById("zielony").value;
            const blue = document.getElementById("niebieski").value;
            document.getElementById("kolor").style.backgroundColor = `rgb(${red}, ${green}, ${blue} )`;
        }
    </script>
</body>
</html>
